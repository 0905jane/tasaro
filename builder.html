<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasaro - Bouquet Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500&family=Red+Rose:wght@400&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --red: #ff0000;
            --blue: #0400ff;
            --purple: #6f00ff;
            --top-sky: #10dfff;
            --right-panel: #f0fdff;
            --option-gray: #d9d9d9;
        }

        html {
            min-height: 100%;
        }

        body {
            min-width: 1120px;
            min-height: 4543px;
            font-family: 'Pretendard', Arial, sans-serif;
            color: var(--blue);
            background: #ffffff;
        }

        button {
            color: inherit;
            font: inherit;
            background: none;
            border: 0;
            cursor: pointer;
        }

        .builder-page {
            position: relative;
            min-height: 4543px;
            overflow: hidden;
            background: #ffffff;
        }

        .top-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 168px;
            background: linear-gradient(180deg, #10dfff 0%, #cef8ff 59.615%, #f2fdff 89.423%);
            z-index: 1;
            pointer-events: none;
        }

        .brand {
            position: fixed;
            top: 0;
            left: calc(50% - 168px);
            z-index: 6;
            color: var(--red);
            font-family: 'Red Rose', serif;
            font-size: 100px;
            font-weight: 400;
            line-height: normal;
            text-decoration: none;
            white-space: nowrap;
        }

        .preview-rail {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            left: calc(50% + 35px);
            z-index: 0;
            background: var(--right-panel);
            pointer-events: none;
        }

        .preview-wrap {
            position: fixed;
            top: 145px;
            left: max(899px, calc(50% + 35px));
            z-index: 3;
            width: 653px;
        }

        .structure-tabs {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            width: 653px;
            height: 27px;
            margin-bottom: 12px;
        }

        .structure-tab {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 27px;
            height: 27px;
            border: 1px solid var(--red);
            border-radius: 50%;
            color: var(--red);
            background: #ffffff;
            font-size: 20px;
            line-height: 1;
        }

        .structure-tab.is-active {
            color: #ffffff;
            background: var(--red);
        }

        .preview-frame {
            width: 653px;
            height: 653px;
            border: 1px solid var(--red);
            background: #ffffff;
            overflow: hidden;
        }

        #bouquetSvg {
            display: block;
            width: 100%;
            height: 100%;
        }

        .selected-copy {
            width: 500px;
            margin-top: 54px;
            color: var(--red);
            font-size: 20px;
            line-height: normal;
            white-space: pre-wrap;
        }

        .action-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            width: 500px;
            margin-top: 41px;
            margin-left: 76px;
        }

        .outline-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 64px;
            padding: 20px 40px;
            border: 1px solid var(--red);
            border-radius: 50px;
            color: var(--red);
            background: #ffffff;
            font-size: 20px;
            line-height: normal;
            white-space: nowrap;
            transition: background 140ms ease, transform 140ms ease;
        }

        .outline-btn:hover {
            background: #fffafa;
            transform: translateY(-1px);
        }

        .share-status {
            width: 500px;
            min-height: 20px;
            margin-top: 14px;
            margin-left: 76px;
            color: var(--red);
            font-size: 14px;
            line-height: 1.4;
            text-align: center;
        }

        .left-content {
            position: relative;
            z-index: 2;
            width: 597px;
            margin-left: max(40px, calc(50% - 688px));
            padding-top: 149px;
            padding-bottom: 160px;
        }

        .step-title {
            color: var(--blue);
            font-size: 25px;
            font-weight: 500;
            line-height: normal;
            white-space: nowrap;
        }

        .step-title.package-title {
            margin-top: 152px;
            color: var(--purple);
        }

        .flower-groups,
        .package-groups {
            margin-top: 40px;
        }

        .option-group {
            width: 597px;
            padding: 20px 0;
            border-bottom: 1px solid currentColor;
        }

        .option-group h2 {
            margin-bottom: 16px;
            font-size: 20px;
            font-weight: 400;
            line-height: normal;
        }

        .option-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            column-gap: 14px;
            row-gap: 12px;
        }

        .option-card {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            width: 200px;
            min-height: 245px;
            gap: 20px;
            text-align: left;
        }

        .option-image {
            width: 180px;
            height: 180px;
            border-radius: 999px;
            background: transparent;
            overflow: hidden;
        }

        .option-image img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
            transition: transform 140ms ease;
        }

        .option-card:hover .option-image img {
            transform: scale(1.06);
        }

        .package-swatch {
            width: 180px;
            height: 180px;
            border: 1px solid rgba(111, 0, 255, 0.24);
            border-radius: 999px;
        }

        .package-section .option-grid {
            grid-template-columns: repeat(5, 90px);
            column-gap: 30px;
            row-gap: 20px;
            width: 570px;
        }

        .package-section .option-card {
            align-items: center;
            width: 90px;
            min-height: 114px;
            gap: 12px;
        }

        .package-section .package-swatch {
            width: 90px;
            height: 90px;
        }

        .package-section .option-label {
            justify-content: center;
            width: 90px;
        }

        .package-section .option-name {
            position: absolute;
            width: 1px;
            height: 1px;
            overflow: hidden;
            clip: rect(0 0 0 0);
            white-space: nowrap;
        }

        .option-label {
            display: flex;
            align-items: center;
            gap: 4px;
            opacity: 0.8;
        }

        .radio-dot {
            width: 12px;
            height: 12px;
            border: 1.5px solid currentColor;
            border-radius: 50%;
            background: #ffffff;
        }

        .option-card.is-selected .radio-dot {
            border: 4px solid currentColor;
        }

        .option-name {
            font-size: 12px;
            line-height: normal;
            white-space: nowrap;
        }

        .package-section {
            color: var(--purple);
        }

        @media (max-width: 1120px) {
            body {
                min-width: 0;
                min-height: 100vh;
                overflow-x: hidden;
            }

            .builder-page {
                min-height: 100vh;
                padding-bottom: 64px;
            }

            .brand {
                left: 50%;
                transform: translateX(-50%);
                font-size: clamp(64px, 18vw, 100px);
            }

            .preview-rail {
                position: relative;
                top: auto;
                left: auto;
                right: auto;
                bottom: auto;
                width: 100%;
                margin-top: 125px;
                padding: 32px 20px 40px;
            }

            .preview-wrap {
                position: relative;
                top: auto;
                left: auto;
                width: min(653px, 100%);
                margin: 0 auto;
            }

            .structure-tabs,
            .preview-frame {
                width: 100%;
            }

            .preview-frame {
                height: auto;
                aspect-ratio: 1;
            }

            .selected-copy,
            .action-row,
            .share-status {
                width: 100%;
                margin-left: 0;
            }

            .left-content {
                width: min(597px, calc(100% - 40px));
                margin: 0 auto;
                padding-top: 42px;
            }

            .option-group,
            .option-grid {
                width: 100%;
            }

            .option-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
                column-gap: 12px;
            }

            .option-card {
                width: 100%;
            }

            .option-image,
            .package-swatch {
                width: min(180px, 100%);
                height: auto;
                aspect-ratio: 1;
            }
        }

        @media (max-width: 640px) {
            .option-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .outline-btn {
                min-height: 56px;
                padding: 16px 24px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <main class="builder-page">
        <div class="top-gradient" aria-hidden="true"></div>
        <a class="brand" href="intro.html" aria-label="Go to intro">Tasaro</a>

        <aside class="preview-rail" aria-label="Bouquet preview"></aside>
        <section class="preview-wrap" aria-label="Live bouquet preview">
            <div class="structure-tabs" id="structureTabs" aria-label="Choose bouquet structure"></div>

            <div class="preview-frame">
                <svg id="bouquetSvg" width="1000" height="1000" viewBox="0 0 653 653" role="img" aria-label="Bouquet preview"></svg>
            </div>

            <p class="selected-copy" id="selectedCopy"></p>

            <div class="action-row">
                <button class="outline-btn" type="button" id="saveImage">Save as Image</button>
                <button class="outline-btn" type="button" id="shareLink">Share Link</button>
            </div>
            <p class="share-status" id="shareStatus" aria-live="polite"></p>
        </section>

        <section class="left-content" aria-label="Bouquet choices">
            <h1 class="step-title">step 1. Choose your flower</h1>
            <div class="flower-groups" id="flowerGroups"></div>

            <h1 class="step-title package-title">step 2. Choose your package</h1>
            <div class="package-groups package-section" id="packageGroups"></div>
        </section>
    </main>

        function optionByKey(key, id) {
            const group = FLOWER_OPTIONS.concat(PACKAGE_OPTIONS).find((item) => item.key === key);
            return group.options.find((item) => item.id === id);
        }

        function nameOf(key) {
            return optionByKey(key, state[key]).name;
        }

        function colorOf(key) {
            return optionByKey(key, state[key]).color;
        }

        function fillOf(key) {
            const option = optionByKey(key, state[key]);
            return option.pattern ? `url(#${key}-pattern)` : option.color;
        }

        function swatchBackground(option) {
            const backgrounds = {
                'checker-small': 'repeating-conic-gradient(#111111 0% 25%, #ffffff 0% 50%) 0 0 / 16px 16px',
                'checker-large': 'repeating-conic-gradient(#111111 0% 25%, #ffffff 0% 50%) 0 0 / 80px 80px',
                'diagonal-stripe': 'repeating-linear-gradient(135deg, #111111 0 9px, #ffffff 9px 18px)',
                'dot-grid': 'radial-gradient(circle at center, #9a9a9a 0 2px, transparent 2px) 0 0 / 12px 12px, #ffffff',
                'checker-soft': 'repeating-conic-gradient(#ededed 0% 25%, #ffffff 0% 50%) 0 0 / 18px 18px',
                'dot-soft': 'radial-gradient(circle at center, #d0d0d0 0 3px, transparent 3px) 0 0 / 22px 22px, #ffffff'
            };
            return option.pattern ? backgrounds[option.pattern] : option.color;
        }

        const IMAGE_DATA_URLS = {};
        let imageDataUrlPromise;
        let useInlineImageHrefs = false;

        function allFlowerImageSources() {
            const sources = FLOWER_OPTIONS.flatMap((group) => group.options.map((option) => option.image));
            return [...new Set(sources.filter(Boolean))];
        }

        function blobToDataUrl(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        }

        function preloadImageDataUrls() {
            if (!imageDataUrlPromise) {
                imageDataUrlPromise = Promise.all(allFlowerImageSources().map(async (src) => {
                    try {
                        const response = await fetch(src);
                        const blob = await response.blob();
                        IMAGE_DATA_URLS[src] = await blobToDataUrl(blob);
                    } catch (error) {
                        console.warn(`Could not inline ${src}`, error);
                    }
                }));
            }
            return imageDataUrlPromise;
        }

        function imageHref(src) {
            return useInlineImageHrefs ? (IMAGE_DATA_URLS[src] || src) : src;
        }

        function renderOptionGroup(group, target) {
            const section = document.createElement('section');
            section.className = 'option-group';
            section.style.color = group.color;

            title.textContent = group.title;

            const grid = document.createElement('div');
            grid.className = 'option-grid';

            group.options.forEach((option) => {
                const button = document.createElement('button');
                button.className = 'option-card';
                button.type = 'button';
                button.dataset.group = group.key;
                button.dataset.value = option.id;
                button.setAttribute('aria-pressed', String(state[group.key] === option.id));

                const media = document.createElement('div');
                if (option.image) {
                    media.className = 'option-image';
                    const image = document.createElement('img');
                    image.src = option.image;
                    image.alt = option.name;
                    media.appendChild(image);
                } else {
                    media.className = 'package-swatch';
                    media.style.background = swatchBackground(option);
                    if (option.border) media.style.borderColor = option.border;
                }

                const label = document.createElement('div');
                label.className = 'option-label';

                const dot = document.createElement('span');
                dot.className = 'radio-dot';
                dot.setAttribute('aria-hidden', 'true');

                const name = document.createElement('span');
                name.className = 'option-name';
                name.textContent = option.name;

                label.append(dot, name);
                button.append(media, label);
                grid.appendChild(button);
            });

            section.appendChild(grid);
            target.appendChild(section);
        }

        function svgEl(tag, attrs = {}, children = []) {
            const node = document.createElementNS(SVG_NS, tag);
            Object.entries(attrs).forEach(([key, value]) => node.setAttribute(key, value));
            children.forEach((child) => node.appendChild(child));
            return node;
        }

        function buildSvgPattern(id, patternName) {
            const configs = {
                'checker-small': { size: 14, dark: '#111111', light: '#ffffff' },
                'checker-large': { size: 42, dark: '#111111', light: '#ffffff' },
                'checker-soft': { size: 18, dark: '#e8e8e8', light: '#ffffff' }
            };

            if (configs[patternName]) {
                const { size, dark, light } = configs[patternName];
                const pattern = svgEl('pattern', { id, width: size, height: size, patternUnits: 'userSpaceOnUse' });
                pattern.appendChild(svgEl('rect', { width: size, height: size, fill: light }));
                pattern.appendChild(svgEl('rect', { width: size / 2, height: size / 2, fill: dark }));
                pattern.appendChild(svgEl('rect', { x: size / 2, y: size / 2, width: size / 2, height: size / 2, fill: dark }));
                return pattern;
            }

            if (patternName === 'diagonal-stripe') {
                const pattern = svgEl('pattern', {
                    id,
                    width: 28,
                    height: 28,
                    patternUnits: 'userSpaceOnUse',
                    patternTransform: 'rotate(45)'
                });
                pattern.appendChild(svgEl('rect', { width: 28, height: 28, fill: '#ffffff' }));
                pattern.appendChild(svgEl('rect', { width: 10, height: 28, fill: '#111111' }));
                return pattern;
            }

            const pattern = svgEl('pattern', { id, width: 22, height: 22, patternUnits: 'userSpaceOnUse' });
            pattern.appendChild(svgEl('rect', { width: 22, height: 22, fill: '#ffffff' }));
            pattern.appendChild(svgEl('circle', {
                cx: 11,
                cy: 11,
                r: patternName === 'dot-grid' ? 2.6 : 3.6,
                fill: patternName === 'dot-grid' ? '#8a8a8a' : '#d0d0d0'
            }));
            return pattern;
        }

        function appendPatternDefs(svg) {
            const defs = svgEl('defs');
            ['outer', 'inner'].forEach((key) => {
                const option = optionByKey(key, state[key]);
                if (option.pattern) defs.appendChild(buildSvgPattern(`${key}-pattern`, option.pattern));
            });
            if (defs.childNodes.length) svg.appendChild(defs);
        }

        function drawPaperLayer(parent, template, layerName, fill) {
            const box = template.paper[layerName];
            const paper = PAPER_PATHS[state.template][layerName];
            const [, , vbWidth, vbHeight] = paper.viewBox;
            const group = svgEl('g', {
                transform: `translate(${box[0]} ${box[1]}) scale(${box[2] / vbWidth} ${box[3] / vbHeight})`
            });
            group.appendChild(svgEl('path', {
                d: paper.d,
                fill,
                stroke: '#0400ff',
                'stroke-width': 1
            }));
            parent.appendChild(group);
        }

        function drawStem(parent, stem) {
            const [x1, y1, x2, y2, width] = stem;
            parent.appendChild(svgEl('line', {
                x1,
                y1,
                x2,
                y2,
                stroke: '#cdffe8',
                'stroke-width': width,
                'stroke-linecap': 'round'
            }));
            parent.appendChild(svgEl('line', {
                x1,
                y1,
                x2,
                y2,
                stroke: '#0400ff',
                'stroke-width': 1
            }));
        }

        function drawStemToSlot(parent, origin, item, index) {
            const [x, y, size] = item;
            const colors = ['#65b64d', '#ff4b55', '#08d4c9', '#a8e000', '#ff7b00'];
            const endY = y + size * 0.38;
            parent.appendChild(svgEl('line', {
                x1: origin[0],
                y1: origin[1],
                x2: x,
                y2: endY,
                stroke: colors[index % colors.length],
                'stroke-width': 5,
                'stroke-linecap': 'round'
            }));
        }

        function drawImage(parent, src, x, y, width, height, angle = 0) {
            const group = svgEl('g', { transform: `translate(${x} ${y}) rotate(${angle})` });
            const image = svgEl('image', {
                x: -width / 2,
                y: -height / 2,
                width,
                height,
                preserveAspectRatio: 'xMidYMid meet'
            });
            const href = imageHref(src);
            image.setAttribute('href', href);
            image.setAttributeNS(XLINK_NS, 'href', href);
            group.appendChild(image);
            parent.appendChild(group);
        }

        function drawCustomStem(parent, origin, slot, index) {
            const colors = ['#49cf36', '#65b64d', '#08d4c9', '#7fe600', '#ff6b2a'];
            parent.appendChild(svgEl('line', {
                x1: origin[0],
                y1: origin[1],
                x2: slot.x,
                y2: slot.y + (slot.size || slot.height) * 0.18,
                stroke: colors[index % colors.length],
                'stroke-width': 3.4,
                'stroke-linecap': 'round',
                opacity: 0.78
            }));
        }

        function drawCustomRoundSlot(parent, key, slot) {
            const option = optionByKey(key, state[key]);
            drawImage(parent, option.image, slot.x, slot.y, slot.size, slot.size, slot.angle || 0);
        }

        function drawCustomTallSlot(parent, key, slot) {
            const option = optionByKey(key, state[key]);
            const width = slot.height * (180 / 374) * (slot.widthScale || 1);
            drawImage(parent, option.image, slot.x, slot.y, width, slot.height, slot.angle || 0);
        }

        function drawCustomRibbonPiece(parent, piece) {
            const group = svgEl('g', { transform: `translate(${piece.x} ${piece.y}) rotate(${piece.angle || 0})` });
            group.appendChild(svgEl('rect', {
                x: -piece.width / 2,
                y: -piece.height / 2,
                width: piece.width,
                height: piece.height,
                fill: colorOf('ribbon'),
                stroke: '#0400ff',
                'stroke-width': 1,
                rx: 1.5
            }));
            parent.appendChild(group);
        }

        function drawCustomBouquetSvg(svg, template, layout) {
            const paper = svgEl('g', { transform: `scale(${template.scale})` });
            drawPaperLayer(paper, template, 'outer', fillOf('outer'));
            drawPaperLayer(paper, template, 'inner', fillOf('inner'));
            svg.appendChild(paper);

            const bouquet = svgEl('g');
            layout.greens.forEach((slot) => drawCustomTallSlot(bouquet, 'green', slot));
            layout.liners.forEach((slot) => drawCustomTallSlot(bouquet, 'liner', slot));

            const stemSlots = layout.secondary.concat(layout.main, layout.filler);
            stemSlots.forEach((slot, index) => drawCustomStem(bouquet, layout.stemOrigin, slot, index));

            layout.secondary.forEach((slot) => drawCustomRoundSlot(bouquet, 'secondary', slot));
            layout.main.forEach((slot) => drawCustomRoundSlot(bouquet, 'main', slot));
            layout.filler.forEach((slot) => drawCustomRoundSlot(bouquet, 'filler', slot));
            layout.ribbonTails.forEach((piece) => drawCustomRibbonPiece(bouquet, piece));
            drawCustomRibbonPiece(bouquet, layout.ribbon);
            svg.appendChild(bouquet);
        }

        function drawRoundImageSlot(parent, key, item) {
            const [x, y, size] = item;
            const multipliers = {
                main: 1.45,
                secondary: 1.32,
                filler: 1.55
            };
            const option = optionByKey(key, state[key]);
            const drawnSize = size * multipliers[key];
            drawImage(parent, option.image, x, y, drawnSize, drawnSize);
        }

        function drawTallImageSlot(parent, key, item) {
            const [x, y, , height, angle] = item;
            const option = optionByKey(key, state[key]);
            const drawnHeight = height * (key === 'green' ? 1.08 : 1.12);
            const naturalWidth = drawnHeight * (180 / 374);
            const drawnWidth = naturalWidth * (key === 'green' ? 1.08 : 0.72);
            drawImage(parent, option.image, x, y, drawnWidth, drawnHeight, angle);
        }

        function drawRibbon(parent, ribbon) {
            const [x, y, width, height, angle] = ribbon;
            const group = svgEl('g', { transform: `translate(${x} ${y}) rotate(${angle})` });
            group.appendChild(svgEl('rect', {
                x: -width / 2,
                y: -height / 2,
                width,
                height,
                fill: colorOf('ribbon'),
                stroke: '#0400ff',
                'stroke-width': 1,
                rx: 1.5
            }));
            parent.appendChild(group);
        }

        function drawBouquetSvg() {
            const svg = document.getElementById('bouquetSvg');
            svg.replaceChildren();
            svg.appendChild(svgEl('rect', { width: 653, height: 653, fill: '#ffffff' }));
            appendPatternDefs(svg);

            const template = TEMPLATES[state.template];
            const customLayout = CUSTOM_LAYOUTS[state.template];
            if (customLayout) {
                drawCustomBouquetSvg(svg, template, customLayout);
                return;
            }

            const art = svgEl('g', { transform: `scale(${template.scale})` });

            drawPaperLayer(art, template, 'outer', fillOf('outer'));
            drawPaperLayer(art, template, 'inner', fillOf('inner'));

            template.stems.forEach((stem) => drawStem(art, stem));
            const stemOrigin = [template.ribbon[0], template.ribbon[1] + 10];
            template.secondary.forEach((item, index) => drawStemToSlot(art, stemOrigin, item, index));
            template.main.forEach((item, index) => drawStemToSlot(art, stemOrigin, item, index + 2));
            template.filler.forEach((item, index) => drawStemToSlot(art, stemOrigin, item, index + 5));
            template.greens.forEach((item) => drawTallImageSlot(art, 'green', item));
            template.liners.forEach((item) => drawTallImageSlot(art, 'liner', item));
            template.secondary.forEach((item) => drawRoundImageSlot(art, 'secondary', item));
            template.main.forEach((item) => drawRoundImageSlot(art, 'main', item));
            template.filler.forEach((item) => drawRoundImageSlot(art, 'filler', item));
            drawRibbon(art, template.ribbon);

            svg.appendChild(art);
        }

            const lines = [
                'Selected:',
                `${nameOf('main')}, ${nameOf('secondary')}, ${nameOf('filler')}`,

            ];
            document.getElementById('selectedCopy').textContent = lines.join('\n');

            updateControls();
            drawBouquetSvg();
            updateSelectedCopy();
            document.getElementById('shareStatus').textContent = '';
        }

        function hydrateFromUrl() {
            const params = new URLSearchParams(window.location.search);
            Object.keys(state).forEach((key) => {
                const value = params.get(key);
                if (!value) return;
                if (key === 'template') {
                    const templateValue = Number(value);
                    if (TEMPLATES[templateValue]) state.template = templateValue;
                    return;
                }
                const option = optionByKey(key, value);
                if (option) state[key] = value;
            });
        }

        function buildShareUrl() {
            const params = new URLSearchParams();
            Object.entries(state).forEach(([key, value]) => params.set(key, value));
            return `${window.location.origin}${window.location.pathname}?${params.toString()}`;
        }

        async function saveImage() {
            await preloadImageDataUrls();
            useInlineImageHrefs = true;
            drawBouquetSvg();

            const sourceSvg = document.getElementById('bouquetSvg').cloneNode(true);
            sourceSvg.setAttribute('xmlns', SVG_NS);
            sourceSvg.setAttribute('xmlns:xlink', XLINK_NS);
            sourceSvg.setAttribute('width', '1000');
            sourceSvg.setAttribute('height', '1000');
            useInlineImageHrefs = false;
            drawBouquetSvg();

            const serialized = new XMLSerializer().serializeToString(sourceSvg);
            const svgBlob = new Blob([serialized], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(svgBlob);
            const image = new Image();

            image.onload = () => {
                const exportCanvas = document.createElement('canvas');
                exportCanvas.width = 1000;
                exportCanvas.height = 1000;
                const exportCtx = exportCanvas.getContext('2d');
                exportCtx.fillStyle = '#ffffff';
                exportCtx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);
                exportCtx.drawImage(image, 0, 0, exportCanvas.width, exportCanvas.height);
                URL.revokeObjectURL(url);

                exportCanvas.toBlob((blob) => {
                    if (!blob) return;
                    const link = document.createElement('a');
                    const pngUrl = URL.createObjectURL(blob);
                    link.href = pngUrl;
                    link.download = `tasaro-bouquet-${Date.now()}.png`;
                    document.body.appendChild(link);
                    link.click();
                    link.remove();
                    URL.revokeObjectURL(pngUrl);
                }, 'image/png');
            };

            image.src = url;
        }

        async function shareLink() {
            const shareUrl = buildShareUrl();
            const status = document.getElementById('shareStatus');

            try {
                await navigator.clipboard.writeText(shareUrl);
                status.textContent = 'Link copied.';
            } catch (error) {
                window.prompt('Copy this link:', shareUrl);
                status.textContent = 'Share link is ready.';
            }
        }

        renderControls();
        hydrateFromUrl();
        render();
        preloadImageDataUrls();

        document.addEventListener('click', (event) => {
            const structureButton = event.target.closest('.structure-tab');
            if (structureButton) {
                state.template = Number(structureButton.dataset.template);
                render();
                return;
            }

            const optionButton = event.target.closest('.option-card');
            if (optionButton) {
                state[optionButton.dataset.group] = optionButton.dataset.value;
                render();
            }
        });

        document.getElementById('saveImage').addEventListener('click', saveImage);
        document.getElementById('shareLink').addEventListener('click', shareLink);
    </script>
</body>
</html>
