<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tasaro - Choose Your Packaging</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* 기본 리셋 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            color: #333333;
            line-height: 1.6;

            /* 🌌 [피그마 스펙 완벽 이식] index.html과 완벽하게 이어지는 깊은 그라데이션 배경 */
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(180deg, #10DFFF 0%, #E8FCFF 12.27%, #FFF 30%);
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* 메인 레이아웃 컨테이너 */
        main {
            max-width: 800px; 
            margin: 0 auto; 
            padding: 60px 24px;
        }

        /* 상단 로고 및 안내 헤더 */
        header {
            text-align: center;
            margin-bottom: 60px;
        }
        header .logo-link img {
            width: 220px; 
            height: auto;
            margin-bottom: 16px;
        }
        header p {
            font-size: 16px;
            color: #4A4A4A;
            letter-spacing: -0.3px;
        }

        /* 📦 피그마 테두리 스타일을 살린 그룹 카드 박스 */
        .select-group {
            background-color: #ffffff; 
            border: 1px solid #10DFFF; 
            padding: 35px 30px;
            margin-bottom: 35px; 
            box-shadow: 0 4px 20px rgba(16, 223, 255, 0.05);
        }

        .select-group h3 {
            font-size: 18px;
            font-weight: 600;
            color: #E60000; /* 시그니처 레드 포인트 */
            margin-bottom: 24px;
        }

        /* 선택지 카드 정렬 가이드 */
        .options-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .select-group label {
            display: inline-flex; 
            flex-direction: column; 
            align-items: center; 
            width: 145px; 
            padding: 14px;
            cursor: pointer; 
            border: 1px solid #eeeeee;
            background-color: #ffffff;
            transition: all 0.25s ease-in-out;
            position: relative;
        }

        /* 체크박스/라디오 디자인 숨김 */
        .select-group label input[type="radio"] {
            position: absolute;
            top: 12px;
            left: 12px;
            accent-color: #E60000;
        }

        .select-group label img {
            width: 110px;
            height: 110px;
            object-fit: cover; 
            margin-bottom: 12px;
            transition: transform 0.25s ease-in-out;
        }

        .select-group label span {
            font-size: 14px;
            color: #555555;
            text-align: center;
        }

        /* 마우스 호버(Hover) 인터랙션 */
        .select-group label:hover {
            border-color: #10DFFF;
            background-color: #f7fdff;
        }
        .select-group label:hover img {
            transform: scale(1.03);
        }

        /* 아이템이 선택(Checked)되었을 때 스타일 */
        .select-group label:has(input:checked) {
            border-color: #E60000;
            background-color: #fff6f6;
        }

        /* ➡️ 하단 버튼 그룹 레이아웃 */
        .btn-group {
            margin-top: 60px; 
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        
        /* 공통 버튼 베이스 스타일 */
        .action-btn {
            display: inline-block; 
            text-decoration: none;
            padding: 16px 40px;
            border-radius: 50px; 
            font-size: 20px;
            font-weight: 600;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }

        /* 이전으로 (꽃 다시 고르기) 버튼 */
        .back-btn {
            border: 1px solid #cccccc;
            background-color: #ffffff;
            color: #777777;
        }
        .back-btn:hover {
            background-color: #fafafa;
            color: #333333;
            transform: scale(1.02);
        }

        /* 다음으로 (꽃다발 완성하기) 버튼 */
        .next-action-btn {
            border: 1px solid #10DFFF;
            background-color: #ffffff;
            color: #E60000; 
            box-shadow: 0 4px 15px rgba(16, 223, 255, 0.1);
        }
        .next-action-btn:hover {
            background-color: #f0fbff;
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(16, 223, 255, 0.25);
        }

        footer {
            text-align: center; 
            margin-top: 100px; 
            padding-bottom: 40px;
            color: #bbbbbb;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <header>
        <a href="intro.html" class="logo-link">
            <img src="images/tasaro_logo.png" alt="tasaro logo">
        </a>
        <p>STEP 2. Wrap your bouquet with perfect paper and ribbon.</p>
    </header>

    <main>
        <section id="packaging-selection">
            
            <div class="select-group">
                <h3>Outer Wrapping Paper (Select 1)</h3>
                <div class="options-container">
                    <label>
                        <input type="radio" name="outer-paper" value="kraft">
                        <img src="images/paper_outer_kraft.png" alt="Kraft Paper">
                        <span>Kraft Paper</span>
                    </label>
                    <label>
                        <input type="radio" name="outer-paper" value="pink">
                        <img src="images/paper_outer_pink.png" alt="Pastel Pink">
                        <span>Pastel Pink</span>
                    </label>
                </div>
            </div>

            <div class="select-group">
                <h3>Ribbon Style (Select 1)</h3>
                <div class="options-container">
                    <label>
                        <input type="radio" name="ribbon" value="chiffon">
                        <img src="images/ribbon_chiffon.png" alt="Chiffon Ribbon">
                        <span>Chiffon Ribbon</span>
                    </label>
                    <label>
                        <input type="radio" name="ribbon" value="satin">
                        <img src="images/ribbon_satin.png" alt="Satin Ribbon">
                        <span>Satin Ribbon</span>
                    </label>
                </div>
            </div>
        </section>

        <div class="btn-group">
            <a href="index.html" class="action-btn back-btn">
                Back to Flowers
            </a>
            <button class="action-btn next-action-btn">
                Complete Bouquet
            </button>
        </div>
    </main>

    <footer>
        <p>© 2026 tasaro. All rights reserved.</p>
    </footer>

    <script>
        const completeButton = document.querySelector('.next-action-btn');

        completeButton.addEventListener('click', function(event) {
            
            // 현재 화면에 실제로 존재하는 겉포장지와 리본만 가져옵니다!
            const outerPaper = document.querySelector('input[name="outer-paper"]:checked');
            const ribbon = document.querySelector('input[name="ribbon"]:checked');

            // ⚠️ [필수 선택 검사] 속포장지 검사 구역은 제외했습니다.
            if (!outerPaper) {
                alert('Please select your Outer Paper! 🎨');
                return;
            }
            if (!ribbon) {
                alert('Please select your Ribbon Style! 🎀');
                return;
            }

            // 첫 페이지에서 저장했던 꽃 보따리 가져오기
            let bouquetData = localStorage.getItem('tasaroFlower');
            
            if (bouquetData) {
                bouquetData = JSON.parse(bouquetData);
            } else {
                bouquetData = {};
            }

            // 고른 데이터를 보따리에 누적하기
            bouquetData.outerPaper = outerPaper.value;
            bouquetData.ribbon = ribbon.value;

            // 브라우저 저장소에 다시 저장!
            localStorage.setItem('tasaroFlower', JSON.stringify(bouquetData));
            
            console.log('데이터 합체 완료!', bouquetData);

            // ➡️ 자바스크립트에서 안전하게 결과 페이지로 이동시켜 줍니다.
            window.location.href = 'result.html';
        });
    </script>
</body>
</html>
