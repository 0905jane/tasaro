<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasaro - Start Creating</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* 기본 리셋 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            /* 피그마에서 추출한 하늘색 그라데이션 수치 완벽 반영 */
            background: linear-gradient(180deg, #10DFFF 0%, #A6F3FF 3%, #FFF 6.74%);
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 메인 컨테이너 */
        .intro-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* 화면 등장 시 부드러운 페이드인 애니메이션 */
            animation: fadeInEffect 1.5s ease-out;
        }

        /* 로고 영역 스타일 */
        .logo-container {
            margin-bottom: 20px;
        }
        .logo-container img {
            width: 350px; /* 로고가 대문에서 시원하게 보이도록 크기 지정 */
            height: auto;
            display: block;
        }

        /* 슬로건 박스 스타일 (피그마 디자인의 하늘색 테두리 상자) */
        .slogan-box {
            border: 1px solid #ffffff;
            padding: 6px 20px;
            margin-bottom: 240px; /* 로고군과 하단 버튼 사이의 넓은 여백 구현 */
            background-color: transparent;
        }

        .slogan-text {
            color: #E60000; /* 피그마에 지정된 강렬하고 감성적인 레드 텍스트 */
            font-size: 20px;
            font-weight: 400;
            letter-spacing: -0.5px;
        }

        /* 시작하기 버튼 스타일 (둥근 하늘색 테두리 버튼) */
        .start-btn {
            display: inline-block;
            text-decoration: none;
            border: 1px solid #10DFFF;
            padding: 16px 64px;
            border-radius: 50px; /* 완전한 알약 형태의 라운딩 */
            background-color: #fff;
            color: #E60000; /* 레드 텍스트 */
            font-size: 24px;
            font-weight: 400;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }

        /* 버튼 마우스 호버 효과 */
        .start-btn:hover {
            background-color: #f0fbff; /* 살짝 푸른빛이 도는 화이트로 변경 */
            transform: scale(1.02); /* 미세하게 커지는 효과 */
            box-shadow: 0 4px 15px rgba(16, 223, 255, 0.2); /* 은은한 하늘색 그림자 */
        }

        /* 애니메이션 키프레임 */
        @keyframes fadeInEffect {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="intro-container">
        <div class="logo-container">
            <img src="images/tasaro_logo.png" alt="Tasaro Logo">
        </div>

        <div class="slogan-box">
            <p class="slogan-text">is your personal online flower shop. Build a bouquet full of your style.</p>
        </div>

        <a href="index.html" class="start-btn">
            Start Creating
        </a>
    </div>

</body>
</html>
